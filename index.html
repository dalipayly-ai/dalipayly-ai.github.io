<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="DaliPay" />
<meta name="theme-color" content="#0B1B3A" />
<title>DaliPay — منظومة إدارة الأعمال</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230B1B3A'/%3E%3Ctext x='50' y='68' font-size='52' font-weight='900' text-anchor='middle' fill='white' font-family='Arial'%3ED%3C/text%3E%3C/svg%3E" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { margin: 0; padding: 0; background: #F5F6FA; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script>
window.storage = {
  get: async (key) => { const v = localStorage.getItem(key); return v == null ? null : { key, value: v }; },
  set: async (key, value) => { try { localStorage.setItem(key, value); return { key, value }; } catch (e) { return null; } },
};
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;
const Em = (e) => ({ size = 16, className = '', style = {} }) => <span className={className} style={{ fontSize: size * 0.95, lineHeight: 1, display: 'inline-flex', ...style }}>{e}</span>;
const LayoutDashboard = Em('🏠');
const ListOrdered = Em('📋');
const Plus = Em('➕');
const Gamepad2 = Em('🎮');
const Package = Em('📦');
const Search = Em('🔍');
const X = Em('✕');
const TrendingUp = Em('📈');
const Wallet = Em('💰');
const Clock = Em('⏱️');
const CheckCircle2 = Em('✅');
const Truck = Em('🚚');
const Trash2 = Em('🗑️');
const Edit3 = Em('✏️');
const Printer = Em('🖨️');
const Banknote = Em('💵');
const Landmark = Em('🏦');
const Settings = Em('⚙️');
const FileText = Em('📄');
const ArrowUpCircle = Em('⬆️');
const ArrowDownCircle = Em('⬇️');
const Menu = Em('☰');
const Users = Em('👥');
const CreditCard = Em('💳');
const Store = Em('🛍️');
const Boxes = Em('📦');
const Receipt = Em('🧾');
const FolderOpen = Em('📂');
const MessageCircle = Em('💬');
const Bell = Em('🔔');
const BarChart3 = Em('📊');
const UserCog = Em('👨‍💼');
const ScrollText = Em('📝');
const ChevronLeft = Em('‹');
const Download = Em('⬇️');
const PhoneCall = Em('📞');

const FONT = `@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
@media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; inset: 0; width: 100%; } }`;

const STATUS = {
  pending:    { label: 'بانتظار الدفع', color: '#D97706', bg: '#FEF3E2' },
  processing: { label: 'قيد التنفيذ',   color: '#1E5FFF', bg: '#EAF0FF' },
  shipped:    { label: 'تم الشحن',      color: '#7C3AED', bg: '#F3EBFF' },
  delivered:  { label: 'تم التسليم',    color: '#16A34A', bg: '#E9F9EE' },
  cancelled:  { label: 'ملغي',          color: '#DC2626', bg: '#FDECEC' },
};
const SERVICE = { topup: { label: 'شحن ألعاب / بطاقات', icon: Gamepad2 }, buy: { label: 'شراء بالنيابة', icon: Package } };
const PAY = { cash: 'كاش', transfer: 'حوالة مصرفية' };

const K_DB = 'dalipay-erp-v1';
const num = v => {
  if (v === null || v === undefined) return 0;
  let t = String(v).trim()
    .replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d))
    .replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
    .replace(/[٫،,]/g, '.');
  const n = parseFloat(t);
  return isNaN(n) ? 0 : n;
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const today = () => new Date().toISOString().slice(0, 10);

const initialDB = {
  settings: { rate: 0, companyPhone: '', companyName: 'DaliPay' },
  wallet: { usd: 0, lyd: 0, tx: [] },
  accounts: [
    { id: 'acc-cash', name: 'الخزنة (كاش)', type: 'cash', balance: 0 },
    { id: 'acc-bank', name: 'الحساب المصرفي', type: 'bank', balance: 0 },
  ],
  customers: [], suppliers: [], products: [], documents: [],
  employees: [{ id: 'emp-owner', name: 'المدير', role: 'مدير' }],
  activeEmployee: 'emp-owner',
  orders: [], audit: [],
};

function DaliPayERP() {
  const [db, setDb] = useState(initialDB);
  const [loading, setLoading] = useState(true);
  const [saveState, setSaveState] = useState('idle');
  const [view, setView] = useState('home');           // home | orders | analytics | menu | sub-screens
  const [orderDetail, setOrderDetail] = useState(null); // order id
  const [showOrderForm, setShowOrderForm] = useState(false);
  const [editOrder, setEditOrder] = useState(null);
  const [showQuick, setShowQuick] = useState(false);
  const [showSearch, setShowSearch] = useState(false);
  const [printData, setPrintData] = useState(null);
  const [filters, setFilters] = useState({ status: 'all', from: '', to: '', employee: 'all', carrier: 'all', supplier: 'all', city: 'all' });
  const [q, setQ] = useState('');

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(K_DB, false);
        if (r?.value) setDb({ ...initialDB, ...JSON.parse(r.value) });
      } catch (e) { /* fresh */ }
      finally { setLoading(false); }
    })();
  }, []);

  useEffect(() => {
    if (printData) { const t = setTimeout(() => { window.print(); }, 250); return () => clearTimeout(t); }
  }, [printData]);

  async function persist(next) {
    setDb(next); setSaveState('saving');
    try { const r = await window.storage.set(K_DB, JSON.stringify(next), false); setSaveState(r ? 'idle' : 'error'); }
    catch (e) { setSaveState('error'); }
  }

  const me = db.employees.find(e => e.id === db.activeEmployee) || db.employees[0];
  const rate = db.settings.rate || 0;
  const fmt = n => new Intl.NumberFormat('ar-LY', { maximumFractionDigits: 2 }).format(n || 0);

  const audit = (action) => ({ id: uid(), date: new Date().toISOString().slice(0, 16).replace('T', ' '), user: me?.name || '—', action });

  // ---------- Orders helpers ----------
  const paidOf = o => (o.payments || []).reduce((s, p) => s + p.amount, 0);
  const remainingOf = o => Math.max(o.priceLYD - paidOf(o), 0);
  const profitOf = o => o.priceLYD - o.costUSD * rate;
  const bookedProfitOf = o => o.priceLYD - o.costUSD * (o.rateAtBooking || rate);

  function upsertCustomer(next, name, phone, city, address) {
    if (!name) return next;
    const existing = next.customers.find(c => (phone && c.phone === phone) || c.name === name);
    if (existing) {
      existing.city = city || existing.city; existing.address = address || existing.address;
      return next;
    }
    next.customers = [{ id: uid(), name, phone: phone || '', city: city || '', address: address || '', notes: '', createdAt: today() }, ...next.customers];
    return next;
  }

  function saveOrder(form) {
    const next = JSON.parse(JSON.stringify(db));
    const rec = {
      ...form,
      costUSD: num(form.costUSD),
      priceLYD: num(form.priceLYD),
      rateAtBooking: form.rateAtBooking ?? rate,
    };
    if (form.id) {
      next.orders = next.orders.map(o => o.id === form.id ? { ...o, ...rec } : o);
      const o = next.orders.find(x => x.id === form.id);
      o.timeline = [...(o.timeline || []), { date: today(), text: 'تم تعديل بيانات الطلب', user: me.name }];
      next.audit = [audit(`تعديل الطلب ${o.orderNo}`), ...next.audit];
    } else {
      rec.id = uid();
      rec.createdBy = me.name;
      rec.payments = [];
      rec.timeline = [{ date: today(), text: 'تم إنشاء الطلب', user: me.name }];
      const dep = num(form.deposit);
      if (dep > 0) {
        rec.payments.push({ id: uid(), amount: dep, method: form.payMethod || 'cash', accountId: form.payMethod === 'transfer' ? 'acc-bank' : 'acc-cash', date: today(), by: me.name, note: 'عربون' });
        const acc = next.accounts.find(a => a.id === (form.payMethod === 'transfer' ? 'acc-bank' : 'acc-cash'));
        if (acc) acc.balance += dep;
        rec.timeline.push({ date: today(), text: `استلام عربون ${fmt(dep)} د.ل`, user: me.name });
      }
      next.orders = [rec, ...next.orders];
      next.audit = [audit(`إنشاء الطلب ${rec.orderNo} للعميل ${rec.customerName}`), ...next.audit];
      upsertCustomer(next, rec.customerName, rec.phone, rec.city, rec.address);
    }
    next.audit = next.audit.slice(0, 500);
    persist(next);
    setShowOrderForm(false); setEditOrder(null);
  }

  function setStatus(id, status) {
    const next = JSON.parse(JSON.stringify(db));
    const o = next.orders.find(x => x.id === id); if (!o) return;
    o.status = status;
    if (status === 'delivered' && !o.deliveredDate) o.deliveredDate = today();
    o.timeline = [...(o.timeline || []), { date: today(), text: `تغيير الحالة إلى: ${STATUS[status].label}`, user: me.name }];
    next.audit = [audit(`تغيير حالة ${o.orderNo} إلى ${STATUS[status].label}`), ...next.audit].slice(0, 500);
    persist(next);
  }

  function deleteOrder(id) {
    const next = JSON.parse(JSON.stringify(db));
    const o = next.orders.find(x => x.id === id);
    next.orders = next.orders.filter(x => x.id !== id);
    next.audit = [audit(`حذف الطلب ${o?.orderNo || ''}`), ...next.audit].slice(0, 500);
    persist(next); setOrderDetail(null);
  }

  function addPayment(orderId, amount, method, note) {
    const amt = num(amount); if (amt <= 0) return;
    const next = JSON.parse(JSON.stringify(db));
    const o = next.orders.find(x => x.id === orderId); if (!o) return;
    const accId = method === 'transfer' ? 'acc-bank' : 'acc-cash';
    o.payments = [...(o.payments || []), { id: uid(), amount: amt, method, accountId: accId, date: today(), by: me.name, note: note || '' }];
    o.timeline = [...(o.timeline || []), { date: today(), text: `تسجيل دفعة ${fmt(amt)} د.ل (${PAY[method]})`, user: me.name }];
    const acc = next.accounts.find(a => a.id === accId); if (acc) acc.balance += amt;
    next.audit = [audit(`تسجيل دفعة ${fmt(amt)} د.ل على ${o.orderNo}`), ...next.audit].slice(0, 500);
    persist(next);
  }

  function updateOrderFields(orderId, fields, timelineText) {
    const next = JSON.parse(JSON.stringify(db));
    const o = next.orders.find(x => x.id === orderId); if (!o) return;
    Object.assign(o, fields);
    if (timelineText) o.timeline = [...(o.timeline || []), { date: today(), text: timelineText, user: me.name }];
    persist(next);
  }

  // Generic list CRUD
  function addItem(listKey, item, auditText) {
    const next = JSON.parse(JSON.stringify(db));
    next[listKey] = [{ id: uid(), ...item }, ...next[listKey]];
    if (auditText) next.audit = [audit(auditText), ...next.audit].slice(0, 500);
    persist(next);
  }
  function removeItem(listKey, id) {
    const next = JSON.parse(JSON.stringify(db));
    next[listKey] = next[listKey].filter(x => x.id !== id);
    persist(next);
  }
  function patch(fn) { const next = JSON.parse(JSON.stringify(db)); fn(next); persist(next); }

  // ---------- Derived ----------
  const live = db.orders.filter(o => o.status !== 'cancelled');
  const stats = useMemo(() => {
    const active = live.filter(o => o.status !== 'delivered');
    const revenue = db.orders.filter(o => o.status === 'delivered').reduce((s, o) => s + o.priceLYD, 0);
    const outstanding = live.reduce((s, o) => s + remainingOf(o), 0);
    const profitNow = live.reduce((s, o) => s + profitOf(o), 0);
    const profitBooked = live.reduce((s, o) => s + bookedProfitOf(o), 0);
    return { total: db.orders.length, active: active.length, revenue, outstanding, profitNow, profitBooked, fxImpact: profitNow - profitBooked };
  }, [db, rate]);

  const alerts = useMemo(() => {
    const a = [];
    if (!rate) a.push({ t: 'حدّد سعر الصرف من الإعدادات حتى تُحسب الأرباح', level: 'warn' });
    live.filter(o => o.expectedDate && o.expectedDate < today() && o.status !== 'delivered')
      .forEach(o => a.push({ t: `الطلب ${o.orderNo} تجاوز موعد التسليم المتوقع (${o.expectedDate})`, level: 'warn' }));
    db.orders.filter(o => o.status === 'delivered' && remainingOf(o) > 0)
      .forEach(o => a.push({ t: `الطلب ${o.orderNo} مُسلَّم وعليه متبقي ${fmt(remainingOf(o))} د.ل`, level: 'err' }));
    db.products.filter(p => p.qty <= (p.minQty || 0) && p.minQty > 0)
      .forEach(p => a.push({ t: `المخزون منخفض: ${p.name} (${p.qty})`, level: 'warn' }));
    return a;
  }, [db, rate]);

  const carriers = [...new Set(db.orders.map(o => o.carrier).filter(Boolean))];
  const cities = [...new Set(db.orders.map(o => o.city).filter(Boolean))];

  const filteredOrders = useMemo(() => db.orders.filter(o => {
    const f = filters;
    if (f.status !== 'all' && o.status !== f.status) return false;
    if (f.from && o.bookingDate < f.from) return false;
    if (f.to && o.bookingDate > f.to) return false;
    if (f.employee !== 'all' && o.createdBy !== f.employee) return false;
    if (f.carrier !== 'all' && o.carrier !== f.carrier) return false;
    if (f.supplier !== 'all' && o.supplierId !== f.supplier) return false;
    if (f.city !== 'all' && o.city !== f.city) return false;
    return true;
  }), [db.orders, filters]);

  const searchResults = useMemo(() => {
    const s = q.trim().toLowerCase(); if (!s) return { orders: [], customers: [] };
    return {
      orders: db.orders.filter(o =>
        (o.orderNo || '').toLowerCase().includes(s) || (o.customerName || '').toLowerCase().includes(s) ||
        (o.phone || '').includes(s) || (o.trackingNo || '').toLowerCase().includes(s) ||
        (o.itemDescription || '').toLowerCase().includes(s)).slice(0, 15),
      customers: db.customers.filter(c => c.name.toLowerCase().includes(s) || (c.phone || '').includes(s)).slice(0, 8),
    };
  }, [q, db]);

  const analytics = useMemo(() => {
    const delivered = db.orders.filter(o => o.status === 'delivered');
    const dayStr = today();
    const weekAgo = new Date(Date.now() - 7 * 864e5).toISOString().slice(0, 10);
    const monthStr = dayStr.slice(0, 7);
    const pOf = o => rate > 0 ? profitOf(o) : 0;
    const profitDay = delivered.filter(o => (o.deliveredDate || '') === dayStr).reduce((s, o) => s + pOf(o), 0);
    const profitWeek = delivered.filter(o => (o.deliveredDate || '') >= weekAgo).reduce((s, o) => s + pOf(o), 0);
    const profitMonth = delivered.filter(o => (o.deliveredDate || '').slice(0, 7) === monthStr).reduce((s, o) => s + pOf(o), 0);
    const topBy = (arr, keyFn, valFn) => {
      const m = {};
      arr.forEach(o => { const k = keyFn(o); if (!k) return; m[k] = (m[k] || 0) + valFn(o); });
      return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, 5);
    };
    const topCustomers = topBy(live, o => o.customerName, o => o.priceLYD);
    const topSuppliers = topBy(live, o => db.suppliers.find(s => s.id === o.supplierId)?.name, () => 1);
    const topProducts = topBy(live, o => o.itemDescription, () => 1);
    const durations = delivered.filter(o => o.bookingDate && o.deliveredDate)
      .map(o => (new Date(o.deliveredDate) - new Date(o.bookingDate)) / 864e5);
    const avgDays = durations.length ? durations.reduce((a, b) => a + b, 0) / durations.length : 0;
    const done = db.orders.filter(o => o.status === 'delivered').length;
    const cancelled = db.orders.filter(o => o.status === 'cancelled').length;
    const empPerf = topBy(db.orders, o => o.createdBy, () => 1);
    return { profitDay, profitWeek, profitMonth, topCustomers, topSuppliers, topProducts, avgDays, done, cancelled, total: db.orders.length, empPerf };
  }, [db, rate]);

  function exportCSV() {
    const head = ['رقم الطلب', 'العميل', 'الهاتف', 'المدينة', 'الطلب', 'السعر د.ل', 'التكلفة $', 'المدفوع', 'المتبقي', 'الحالة', 'تاريخ الحجز', 'شركة الشحن', 'رقم التتبع', 'الموظف'];
    const rows = db.orders.map(o => [o.orderNo, o.customerName, o.phone, o.city, o.itemDescription, o.priceLYD, o.costUSD, paidOf(o), remainingOf(o), STATUS[o.status].label, o.bookingDate, o.carrier || '', o.trackingNo || '', o.createdBy || '']);
    const csv = '\uFEFF' + [head, ...rows].map(r => r.map(c => `"${String(c ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
    const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
    const a = document.createElement('a'); a.href = url; a.download = `dalipay-orders-${today()}.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  // =================================================================
  if (printData) {
    const o = printData.order;
    return (
      <div dir="rtl" id="print-area" style={{ fontFamily: "'Tajawal', sans-serif" }} className="bg-white text-black p-4 min-h-screen">
        <style>{FONT}</style>
        {printData.type === 'waybill' && <Waybill o={o} fmt={fmt} paid={paidOf(o)} remaining={remainingOf(o)} suppliers={db.suppliers} />}
        {printData.type === 'invoice' && <Invoice o={o} fmt={fmt} paid={paidOf(o)} remaining={remainingOf(o)} />}
        {printData.type === 'report' && <Report orders={db.orders} fmt={fmt} stats={stats} rate={rate} profitOf={profitOf} paidOf={paidOf} remainingOf={remainingOf} />}
        <div className="text-center mt-6 print:hidden">
          <button onClick={() => setPrintData(null)} className="text-sm font-bold text-[#1E5FFF] border border-[#1E5FFF] rounded-xl px-6 py-2">رجوع للمنظومة</button>
        </div>
      </div>
    );
  }

  const currentOrder = db.orders.find(o => o.id === orderDetail);

  const MENU = [
    { id: 'customers', icon: Users, label: 'العملاء' },
    { id: 'shipments', icon: Truck, label: 'الشحنات' },
    { id: 'payments', icon: CreditCard, label: 'المدفوعات' },
    { id: 'wallets', icon: Wallet, label: 'المحافظ' },
    { id: 'accounts', icon: Landmark, label: 'الحسابات المالية' },
    { id: 'suppliers', icon: Store, label: 'الموردون' },
    { id: 'inventory', icon: Boxes, label: 'المخزون' },
    { id: 'invoices', icon: Receipt, label: 'الفواتير' },
    { id: 'documents', icon: FolderOpen, label: 'المستندات' },
    { id: 'support', icon: MessageCircle, label: 'خدمة العملاء' },
    { id: 'notifications', icon: Bell, label: 'الإشعارات', badge: alerts.length },
    { id: 'reports', icon: BarChart3, label: 'التقارير' },
    { id: 'employees', icon: UserCog, label: 'الموظفون' },
    { id: 'audit', icon: ScrollText, label: 'سجل العمليات' },
    { id: 'settings', icon: Settings, label: 'الإعدادات' },
  ];

  const isSub = !['home', 'orders', 'analytics', 'menu'].includes(view);
  const subLabel = MENU.find(m => m.id === view)?.label || '';

  return (
    <div dir="rtl" style={{ fontFamily: "'Tajawal', sans-serif" }} className="min-h-screen bg-[#F5F6FA] text-[#1B2233] pb-28">
      <style>{FONT}</style>

      {/* Header */}
      <header className="bg-[#0B1B3A] text-white px-4 pt-5 pb-3 sticky top-0 z-30">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            {isSub && <button onClick={() => setView('menu')} className="p-1 -mr-1"><ChevronLeft size={20} className="rotate-180" /></button>}
            <div>
              <div className="text-lg font-black leading-none">{isSub ? subLabel : <>Dali<span className="text-[#4F8AFF]">Pay</span></>}</div>
              {!isSub && <div className="text-[10px] text-white/50 mt-0.5">منظومة إدارة الأعمال</div>}
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => { setShowSearch(true); setQ(''); }} className="p-2 bg-white/10 rounded-xl"><Search size={17} /></button>
            <button onClick={() => setView('notifications')} className="p-2 bg-white/10 rounded-xl relative">
              <Bell size={17} />
              {alerts.length > 0 && <span className="absolute -top-1 -left-1 bg-red-500 text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center">{alerts.length}</span>}
            </button>
          </div>
        </div>
        <div className="mt-1.5 text-[10px] text-white/40 flex items-center gap-2">
          <span>👤 {me?.name}</span>
          <span>· {rate > 0 ? `الصرف: ${fmt(rate)}` : 'الصرف غير محدد'}</span>
          <span>· {saveState === 'saving' ? 'جارٍ الحفظ...' : saveState === 'error' ? '⚠️ تعذّر الحفظ' : 'محفوظ ✓'}</span>
        </div>
      </header>

      <main className="px-4 py-4 max-w-lg mx-auto">
        {loading ? <div className="text-sm text-[#6B7280] py-20 text-center">جارٍ التحميل...</div> : (
          <>
            {view === 'home' && <Home stats={stats} fmt={fmt} rate={rate} alerts={alerts} orders={db.orders} openOrder={id => setOrderDetail(id)} goOrders={() => setView('orders')} exportCSV={exportCSV} print={() => setPrintData({ type: 'report' })} />}
            {view === 'orders' && <OrdersScreen orders={filteredOrders} allOrders={db.orders} filters={filters} setFilters={setFilters} db={db} carriers={carriers} cities={cities} fmt={fmt} paidOf={paidOf} remainingOf={remainingOf} openOrder={id => setOrderDetail(id)} />}
            {view === 'analytics' && <Analytics a={analytics} fmt={fmt} rate={rate} />}
            {view === 'menu' && (
              <div className="grid grid-cols-3 gap-3">
                {MENU.map(m => {
                  const Icon = m.icon;
                  return (
                    <button key={m.id} onClick={() => setView(m.id)} className="bg-white rounded-2xl border border-black/5 p-3 flex flex-col items-center gap-2 active:bg-black/5 relative">
                      {m.badge > 0 && <span className="absolute top-2 left-2 bg-red-500 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center">{m.badge}</span>}
                      <div className="w-10 h-10 rounded-xl bg-[#F0F4FF] flex items-center justify-center"><Icon size={19} className="text-[#1E5FFF]" /></div>
                      <span className="text-[10px] font-bold text-center leading-tight">{m.label}</span>
                    </button>
                  );
                })}
              </div>
            )}

            {view === 'customers' && <Customers db={db} fmt={fmt} addItem={addItem} removeItem={removeItem} patch={patch} paidOf={paidOf} openOrder={id => setOrderDetail(id)} />}
            {view === 'shipments' && <Shipments orders={live.filter(o => o.serviceType === 'buy')} fmt={fmt} openOrder={id => setOrderDetail(id)} updateOrderFields={updateOrderFields} />}
            {view === 'payments' && <PaymentsScreen orders={db.orders} fmt={fmt} openOrder={id => setOrderDetail(id)} />}
            {view === 'wallets' && <Wallets db={db} fmt={fmt} rate={rate} patch={patch} auditMk={audit} />}
            {view === 'accounts' && <Accounts db={db} fmt={fmt} patch={patch} addItem={addItem} removeItem={removeItem} />}
            {view === 'suppliers' && <Suppliers db={db} addItem={addItem} removeItem={removeItem} orders={db.orders} />}
            {view === 'inventory' && <Inventory db={db} addItem={addItem} removeItem={removeItem} patch={patch} fmt={fmt} />}
            {view === 'invoices' && <Invoices orders={db.orders} fmt={fmt} remainingOf={remainingOf} setPrintData={setPrintData} />}
            {view === 'documents' && <Documents db={db} addItem={addItem} removeItem={removeItem} />}
            {view === 'support' && <SupportScreen db={db} />}
            {view === 'notifications' && <Notifications alerts={alerts} />}
            {view === 'reports' && <Reports exportCSV={exportCSV} setPrintData={setPrintData} stats={stats} fmt={fmt} />}
            {view === 'employees' && <Employees db={db} addItem={addItem} removeItem={removeItem} patch={patch} />}
            {view === 'audit' && <AuditLog audit={db.audit} />}
            {view === 'settings' && <SettingsScreen db={db} patch={patch} fmt={fmt} />}
          </>
        )}
      </main>

      {/* Quick actions FAB */}
      <button onClick={() => setShowQuick(true)} className="fixed bottom-24 left-4 z-40 w-14 h-14 rounded-full bg-[#1E5FFF] text-white flex items-center justify-center shadow-lg shadow-blue-500/30 active:bg-[#164BD1]"><Plus size={26} /></button>

      {showQuick && (
        <Sheet onClose={() => setShowQuick(false)} title="إجراء سريع">
          <div className="grid grid-cols-2 gap-3">
            <QuickBtn icon={Plus} label="إنشاء طلب" onClick={() => { setShowQuick(false); setEditOrder(null); setShowOrderForm(true); }} />
            <QuickBtn icon={Users} label="إضافة عميل" onClick={() => { setShowQuick(false); setView('customers'); }} />
            <QuickBtn icon={CreditCard} label="تسجيل دفعة" onClick={() => { setShowQuick(false); setView('payments'); }} />
            <QuickBtn icon={Truck} label="تحديث شحنة" onClick={() => { setShowQuick(false); setView('shipments'); }} />
            <QuickBtn icon={Download} label="تصدير Excel" onClick={() => { setShowQuick(false); exportCSV(); }} />
            <QuickBtn icon={Printer} label="طباعة تقرير" onClick={() => { setShowQuick(false); setPrintData({ type: 'report' }); }} />
          </div>
        </Sheet>
      )}

      {/* Bottom nav */}
      <nav className="fixed bottom-0 inset-x-0 z-40 bg-white border-t border-black/10 flex justify-around px-2 pt-2 pb-5">
        {[
          { id: 'home', icon: LayoutDashboard, label: 'الرئيسية' },
          { id: 'orders', icon: ListOrdered, label: 'الطلبات' },
          { id: 'analytics', icon: TrendingUp, label: 'التحليلات' },
          { id: 'menu', icon: Menu, label: 'القائمة' },
        ].map(t => {
          const Icon = t.icon; const active = view === t.id || (t.id === 'menu' && isSub);
          return (
            <button key={t.id} onClick={() => setView(t.id)} className={`flex flex-col items-center gap-1 px-3 py-1 text-[10px] font-bold ${active ? 'text-[#1E5FFF]' : 'text-[#9CA3AF]'}`}>
              <Icon size={21} />{t.label}
            </button>
          );
        })}
      </nav>

      {/* Global search */}
      {showSearch && (
        <div className="fixed inset-0 bg-black/40 z-50" onClick={() => setShowSearch(false)}>
          <div dir="rtl" style={{ fontFamily: "'Tajawal', sans-serif" }} className="bg-white rounded-b-3xl p-4 max-h-[80vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="relative mb-3">
              <Search size={16} className="absolute right-3 top-1/2 -translate-y-1/2 text-[#9CA3AF]" />
              <input autoFocus value={q} onChange={e => setQ(e.target.value)} placeholder="رقم الطلب، الهاتف، اسم العميل، رقم التتبع، المنتج..."
                className="w-full bg-[#F5F6FA] border border-black/10 rounded-xl pr-9 pl-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#4F8AFF]" />
            </div>
            {q && (
              <div className="space-y-2">
                {searchResults.orders.map(o => (
                  <button key={o.id} onClick={() => { setShowSearch(false); setOrderDetail(o.id); }} className="w-full text-right bg-[#F5F6FA] rounded-xl px-3 py-2.5">
                    <div className="text-sm font-bold">{o.orderNo} · {o.customerName}</div>
                    <div className="text-[11px] text-[#6B7280]">{o.itemDescription} · {STATUS[o.status].label}</div>
                  </button>
                ))}
                {searchResults.customers.map(c => (
                  <div key={c.id} className="bg-[#EAF0FF] rounded-xl px-3 py-2.5">
                    <div className="text-sm font-bold">👤 {c.name}</div>
                    <div className="text-[11px] text-[#6B7280]">{c.phone} {c.city && `· ${c.city}`}</div>
                  </div>
                ))}
                {searchResults.orders.length === 0 && searchResults.customers.length === 0 && <div className="text-sm text-[#9CA3AF] text-center py-6">لا نتائج</div>}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Order form */}
      {showOrderForm && (
        <OrderForm
          initial={editOrder}
          orderCount={db.orders.length}
          rate={rate} fmt={fmt}
          suppliers={db.suppliers}
          customers={db.customers}
          onSave={saveOrder}
          onClose={() => { setShowOrderForm(false); setEditOrder(null); }}
        />
      )}

      {/* Order detail */}
      {currentOrder && (
        <OrderDetail
          o={currentOrder} fmt={fmt} rate={rate}
          paid={paidOf(currentOrder)} remaining={remainingOf(currentOrder)} profit={profitOf(currentOrder)}
          suppliers={db.suppliers}
          onClose={() => setOrderDetail(null)}
          onEdit={() => { setEditOrder(currentOrder); setShowOrderForm(true); }}
          onDelete={() => deleteOrder(currentOrder.id)}
          onStatus={s => setStatus(currentOrder.id, s)}
          onPay={(amt, m, n) => addPayment(currentOrder.id, amt, m, n)}
          onTrack={(carrier, trackingNo) => updateOrderFields(currentOrder.id, { carrier, trackingNo }, `تحديث بيانات الشحن: ${carrier} - ${trackingNo}`)}
          onNote={notes => updateOrderFields(currentOrder.id, { notes })}
          printWaybill={() => setPrintData({ type: 'waybill', order: currentOrder })}
          printInvoice={() => setPrintData({ type: 'invoice', order: currentOrder })}
        />
      )}
    </div>
  );
}

/* ============ shared ============ */
const inp = "w-full border border-black/10 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#4F8AFF] bg-white";
const Field = ({ label, children }) => (<div><label className="text-xs font-bold text-[#6B7280] block mb-1.5">{label}</label>{children}</div>);
const Card = ({ children, className = '' }) => <div className={`bg-white rounded-2xl border border-black/5 ${className}`}>{children}</div>;
const Empty = ({ t }) => <div className="text-sm text-[#9CA3AF] text-center py-10">{t}</div>;
const Row = ({ label, value, color }) => (<div className="flex items-center justify-between text-sm"><span className="text-[#6B7280] text-xs">{label}</span><b style={color ? { color } : undefined}>{value}</b></div>);
const StatusBadge = ({ s }) => <span className="text-[10px] font-bold px-2 py-1 rounded-full shrink-0" style={{ color: STATUS[s].color, background: STATUS[s].bg }}>{STATUS[s].label}</span>;
const QuickBtn = ({ icon: Icon, label, onClick }) => (
  <button onClick={onClick} className="flex items-center gap-2.5 bg-[#F5F6FA] rounded-xl px-3 py-3.5 text-xs font-bold active:bg-black/10">
    <Icon size={16} className="text-[#1E5FFF]" /> {label}
  </button>
);
function Sheet({ title, children, onClose }) {
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-end" onClick={onClose}>
      <div dir="rtl" style={{ fontFamily: "'Tajawal', sans-serif" }} className="bg-white rounded-t-3xl w-full max-h-[92vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="sticky top-0 bg-white flex items-center justify-between px-5 py-4 border-b border-black/5 z-10">
          <h2 className="text-base font-black">{title}</h2>
          <button onClick={onClose} className="p-1.5 active:bg-black/5 rounded-lg"><X size={18} /></button>
        </div>
        <div className="p-5 pb-10">{children}</div>
      </div>
    </div>
  );
}

/* ============ Home ============ */
function Home({ stats, fmt, rate, alerts, orders, openOrder, goOrders, exportCSV, print }) {
  return (
    <div className="space-y-4">
      {alerts.length > 0 && (
        <Card className="p-4 space-y-2">
          <div className="text-sm font-bold flex items-center gap-1.5"><Bell size={15} className="text-[#D97706]" /> تنبيهات ({alerts.length})</div>
          {alerts.slice(0, 3).map((a, i) => (
            <div key={i} className={`text-[11px] font-bold rounded-xl px-3 py-2 ${a.level === 'err' ? 'bg-[#FDECEC] text-red-700' : 'bg-[#FEF3E2] text-[#D97706]'}`}>{a.t}</div>
          ))}
        </Card>
      )}
      <div className="grid grid-cols-2 gap-3">
        <Stat label="إجمالي الطلبات" value={stats.total} icon={ListOrdered} accent="#1E5FFF" />
        <Stat label="طلبات نشطة" value={stats.active} icon={Clock} accent="#D97706" />
        <Stat label="إيراد محصّل د.ل" value={fmt(stats.revenue)} icon={TrendingUp} accent="#16A34A" />
        <Stat label="متبقي عند العملاء" value={fmt(stats.outstanding)} icon={Banknote} accent="#DC2626" />
      </div>
      {rate > 0 && (
        <Card className="p-4 space-y-2.5">
          <div className="text-sm font-bold">الأرباح</div>
          <Row label="الربح بسعر اليوم" value={`${fmt(stats.profitNow)} د.ل`} color={stats.profitNow >= 0 ? '#16A34A' : '#DC2626'} />
          <Row label="الربح وقت الحجز" value={`${fmt(stats.profitBooked)} د.ل`} />
          <Row label="أثر تغيّر الصرف" value={`${stats.fxImpact >= 0 ? '+' : ''}${fmt(stats.fxImpact)} د.ل`} color={stats.fxImpact >= 0 ? '#16A34A' : '#DC2626'} />
        </Card>
      )}
      <div className="grid grid-cols-2 gap-3">
        <button onClick={print} className="flex items-center justify-center gap-2 bg-white border border-black/10 text-xs font-bold py-3 rounded-2xl active:bg-black/5"><Printer size={15} /> طباعة تقرير</button>
        <button onClick={exportCSV} className="flex items-center justify-center gap-2 bg-white border border-black/10 text-xs font-bold py-3 rounded-2xl active:bg-black/5"><Download size={15} /> تصدير Excel</button>
      </div>
      <Card>
        <div className="flex items-center justify-between px-4 py-3 border-b border-black/5">
          <div className="text-sm font-bold">النشاط الأخير</div>
          <button onClick={goOrders} className="text-xs font-bold text-[#1E5FFF]">عرض الكل</button>
        </div>
        {orders.length === 0 ? <Empty t="لا توجد طلبات بعد - اضغط + لإضافة أول طلب" /> : (
          <div className="divide-y divide-black/5">
            {orders.slice(0, 5).map(o => (
              <button key={o.id} onClick={() => openOrder(o.id)} className="w-full flex items-center justify-between px-4 py-3 gap-2 text-right active:bg-black/5">
                <div className="min-w-0">
                  <div className="text-sm font-bold truncate">{o.orderNo} · {o.customerName}</div>
                  <div className="text-[11px] text-[#6B7280] truncate">{o.itemDescription || SERVICE[o.serviceType]?.label}</div>
                </div>
                <StatusBadge s={o.status} />
              </button>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}
const Stat = ({ label, value, icon: Icon, accent }) => (
  <Card className="p-4">
    <div className="w-9 h-9 rounded-xl flex items-center justify-center mb-2" style={{ background: accent + '1A' }}><Icon size={17} style={{ color: accent }} /></div>
    <div className="text-lg font-black leading-tight">{value}</div>
    <div className="text-[11px] text-[#6B7280] mt-0.5">{label}</div>
  </Card>
);

/* ============ Orders ============ */
function OrdersScreen({ orders, allOrders, filters, setFilters, db, carriers, cities, fmt, paidOf, remainingOf, openOrder }) {
  const [showFilters, setShowFilters] = useState(false);
  const employees = [...new Set(allOrders.map(o => o.createdBy).filter(Boolean))];
  const activeFilters = Object.entries(filters).filter(([k, v]) => v !== 'all' && v !== '').length;
  return (
    <div className="space-y-3">
      <div className="flex gap-2 overflow-x-auto pb-1 -mx-4 px-4">
        <Chip active={filters.status === 'all'} onClick={() => setFilters({ ...filters, status: 'all' })}>الكل</Chip>
        {Object.entries(STATUS).map(([k, v]) => <Chip key={k} active={filters.status === k} onClick={() => setFilters({ ...filters, status: k })}>{v.label}</Chip>)}
        <Chip active={activeFilters > (filters.status !== 'all' ? 1 : 0)} onClick={() => setShowFilters(true)}>فلاتر متقدمة {activeFilters > 0 ? `(${activeFilters})` : ''}</Chip>
      </div>
      {orders.length === 0 ? <Card><Empty t="لا توجد طلبات مطابقة" /></Card> : orders.map(o => (
        <button key={o.id} onClick={() => openOrder(o.id)} className="w-full text-right">
          <Card className="p-4 active:bg-black/5">
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0">
                <div className="text-sm font-bold truncate">{o.orderNo} · {o.customerName}</div>
                <div className="text-[11px] text-[#6B7280]">{o.phone} {o.city && `· ${o.city}`}</div>
                <div className="text-xs text-[#374151] mt-1 truncate">{o.itemDescription}</div>
              </div>
              <StatusBadge s={o.status} />
            </div>
            <div className="flex flex-wrap gap-x-4 gap-y-1 mt-2.5 pt-2.5 border-t border-black/5 text-[11px]">
              <span><span className="text-[#9CA3AF]">السعر: </span><b>{fmt(o.priceLYD)} د.ل</b></span>
              <span><span className="text-[#9CA3AF]">المدفوع: </span><b>{fmt(paidOf(o))}</b></span>
              <span><span className="text-[#9CA3AF]">المتبقي: </span><b className={remainingOf(o) > 0 ? 'text-red-600' : 'text-green-600'}>{fmt(remainingOf(o))}</b></span>
              {o.trackingNo && <span><span className="text-[#9CA3AF]">تتبع: </span><b>{o.trackingNo}</b></span>}
            </div>
          </Card>
        </button>
      ))}
      {showFilters && (
        <Sheet title="فلاتر متقدمة" onClose={() => setShowFilters(false)}>
          <div className="space-y-4">
            <div className="grid grid-cols-2 gap-3">
              <Field label="من تاريخ"><input type="date" value={filters.from} onChange={e => setFilters({ ...filters, from: e.target.value })} className={inp} /></Field>
              <Field label="إلى تاريخ"><input type="date" value={filters.to} onChange={e => setFilters({ ...filters, to: e.target.value })} className={inp} /></Field>
            </div>
            <Field label="الموظف">
              <select value={filters.employee} onChange={e => setFilters({ ...filters, employee: e.target.value })} className={inp}>
                <option value="all">الكل</option>{employees.map(e => <option key={e} value={e}>{e}</option>)}
              </select>
            </Field>
            <Field label="شركة الشحن">
              <select value={filters.carrier} onChange={e => setFilters({ ...filters, carrier: e.target.value })} className={inp}>
                <option value="all">الكل</option>{carriers.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </Field>
            <Field label="المورد">
              <select value={filters.supplier} onChange={e => setFilters({ ...filters, supplier: e.target.value })} className={inp}>
                <option value="all">الكل</option>{db.suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </Field>
            <Field label="المدينة">
              <select value={filters.city} onChange={e => setFilters({ ...filters, city: e.target.value })} className={inp}>
                <option value="all">الكل</option>{cities.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </Field>
            <div className="flex gap-3">
              <button onClick={() => setShowFilters(false)} className="flex-1 bg-[#1E5FFF] text-white font-bold text-sm py-3 rounded-xl">تطبيق</button>
              <button onClick={() => { setFilters({ status: 'all', from: '', to: '', employee: 'all', carrier: 'all', supplier: 'all', city: 'all' }); setShowFilters(false); }} className="px-4 py-3 rounded-xl text-sm font-bold border border-black/10">مسح</button>
            </div>
          </div>
        </Sheet>
      )}
    </div>
  );
}
const Chip = ({ active, onClick, children }) => (
  <button onClick={onClick} className={`shrink-0 text-[11px] font-bold px-3 py-1.5 rounded-full border ${active ? 'bg-[#0B1B3A] text-white border-[#0B1B3A]' : 'bg-white text-[#6B7280] border-black/10'}`}>{children}</button>
);

/* ============ Order form ============ */
function OrderForm({ initial, orderCount, rate, fmt, suppliers, customers, onSave, onClose }) {
  const [f, setF] = useState(initial ? { ...initial, costUSD: String(initial.costUSD), priceLYD: String(initial.priceLYD) } : {
    id: null, orderNo: 'DP-' + String(orderCount + 1).padStart(4, '0'),
    customerName: '', phone: '', city: '', address: '',
    serviceType: 'buy', itemDescription: '', supplierId: '',
    costUSD: '', priceLYD: '', deposit: '', payMethod: 'cash',
    status: 'pending', bookingDate: today(), expectedDate: '',
    carrier: '', trackingNo: '', rateAtBooking: null, notes: '',
  });
  const set = (k, v) => setF({ ...f, [k]: v });
  const cost = num(f.costUSD), price = num(f.priceLYD);
  const liveProfit = rate > 0 ? price - cost * rate : null;
  const pickCustomer = id => {
    const c = customers.find(x => x.id === id); if (!c) return;
    setF({ ...f, customerName: c.name, phone: c.phone, city: c.city, address: c.address });
  };
  return (
    <Sheet title={f.id ? 'تعديل الطلب' : `طلب جديد · ${f.orderNo}`} onClose={onClose}>
      <form onSubmit={e => { e.preventDefault(); if (f.customerName.trim() && f.priceLYD) onSave(f); }} className="space-y-4">
        {customers.length > 0 && !f.id && (
          <Field label="اختر عميل موجود (اختياري)">
            <select onChange={e => pickCustomer(e.target.value)} className={inp} defaultValue="">
              <option value="">— عميل جديد —</option>
              {customers.map(c => <option key={c.id} value={c.id}>{c.name} {c.phone && `(${c.phone})`}</option>)}
            </select>
          </Field>
        )}
        <Field label="اسم العميل *"><input required value={f.customerName} onChange={e => set('customerName', e.target.value)} className={inp} /></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="رقم الهاتف"><input inputMode="tel" value={f.phone} onChange={e => set('phone', e.target.value)} className={inp} /></Field>
          <Field label="المدينة"><input value={f.city} onChange={e => set('city', e.target.value)} className={inp} /></Field>
        </div>
        <Field label="العنوان"><input value={f.address} onChange={e => set('address', e.target.value)} className={inp} /></Field>
        <Field label="نوع الخدمة">
          <div className="grid grid-cols-2 gap-2">
            {Object.entries(SERVICE).map(([k, v]) => {
              const Icon = v.icon;
              return <button type="button" key={k} onClick={() => set('serviceType', k)}
                className={`flex items-center justify-center gap-1.5 px-2 py-3 rounded-xl text-[11px] font-bold border ${f.serviceType === k ? 'bg-[#1E5FFF] text-white border-[#1E5FFF]' : 'border-black/10 text-[#374151]'}`}>
                <Icon size={14} /> {v.label}</button>;
            })}
          </div>
        </Field>
        <Field label="بيانات المنتج / الطلب"><input value={f.itemDescription} onChange={e => set('itemDescription', e.target.value)} placeholder="مثال: 660 شدة ببجي / طلبية شي إن 5 قطع" className={inp} /></Field>
        {suppliers.length > 0 && (
          <Field label="المورد">
            <select value={f.supplierId} onChange={e => set('supplierId', e.target.value)} className={inp}>
              <option value="">—</option>{suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </Field>
        )}
        <div className="grid grid-cols-2 gap-3">
          <Field label="التكلفة بالدولار $"><input type="text" inputMode="decimal" value={f.costUSD} onChange={e => set('costUSD', e.target.value)} className={inp} /></Field>
          <Field label="السعر للعميل د.ل *"><input required type="text" inputMode="decimal" value={f.priceLYD} onChange={e => set('priceLYD', e.target.value)} className={inp} /></Field>
        </div>
        {liveProfit !== null && (cost > 0 || price > 0) && (
          <div className={`text-xs font-bold rounded-xl px-4 py-2.5 ${liveProfit >= 0 ? 'bg-[#E9F9EE] text-green-700' : 'bg-[#FDECEC] text-red-700'}`}>

          <div className="grid grid-cols-2 gap-3">
            <Field label="عربون مستلم د.ل"><input type="text" inputMode="decimal" value={f.deposit} onChange={e => set('deposit', e.target.value)} className={inp} /></Field>

        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="شركة الشحن"><input value={f.carrier} onChange={e => set('carrier', e.target.value)} className={inp} /></Field>
          <Field label="رقم التتبع"><input value={f.trackingNo} onChange={e => set('trackingNo', e.target.value)} className={inp} /></Field>
        </div>
        <Field label="ملاحظات"><textarea value={f.notes} onChange={e => set('notes', e.target.value)} rows={2} className={inp} /></Field>
        <div className="flex gap-3 pt-1">

      {tab === 'timeline' && (
        <div className="space-y-0">
          {(o.timeline || []).slice().reverse().map((t, i) => (
            <div key={i} className="flex gap-3 pb-4">

                <div className="w-2.5 h-2.5 rounded-full bg-[#1E5FFF] mt-1.5" />
                <div className="flex-1 w-px bg-black/10" />
              </div>
              <div>
                <div className="text-sm font-bold">{t.text}</div>
                <div className="text-[11px] text-[#9CA3AF]">{t.date} · {t.user}</div>
              </div>
            </div>
          ))}

      )}

      {tab === 'notes' && (
        <div className="space-y-3">
          <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={5} className={inp} placeholder="ملاحظات الطلب..." />

/* ============ Customers ============ */

      {db.customers.length === 0 ? <Card><Empty t="لا عملاء بعد - يُضافون تلقائياً مع كل طلب جديد" /></Card> : db.customers.map(c => {

                  <div className="text-[#9CA3AF]">{fmt(total)} د.ل</div>
                </div>
              </div>
            </Card>
          </button>

      {showAdd && (
        <Sheet title="عميل جديد" onClose={() => setShowAdd(false)}>

            <Field label="الهاتف"><input inputMode="tel" value={f.phone} onChange={e => setF({ ...f, phone: e.target.value })} className={inp} /></Field>
            <Field label="المدينة"><input value={f.city} onChange={e => setF({ ...f, city: e.target.value })} className={inp} /></Field>
            <Field label="العنوان"><input value={f.address} onChange={e => setF({ ...f, address: e.target.value })} className={inp} /></Field>

              <Row label="الهاتف" value={selC.phone || '—'} />
              <Row label="المدينة" value={selC.city || '—'} />
              <Row label="العنوان" value={selC.address || '—'} />
              {selC.notes && <Row label="ملاحظات" value={selC.notes} />}
            </Card>
            {selC.phone && (
              <a href={`https://wa.me/${selC.phone.replace(/[^0-9]/g, '')}`} target="_blank" rel="noreferrer"
                className="flex items-center justify-center gap-2 bg-[#25D366] text-white text-sm font-bold py-3 rounded-xl">
                <MessageCircle size={16} /> مراسلة واتساب

            {ordersOf(selC).map(o => (
              <button key={o.id} onClick={() => { setSel(null); openOrder(o.id); }} className="w-full text-right">

/* ============ Shipments ============ */

  return (
    <div className="space-y-4">
      {groups.map(([st, label]) => {
        const list = orders.filter(o => o.status === st);
        return (
          <div key={st}>
            <div className="text-xs font-bold text-[#6B7280] mb-2">{label} ({list.length})</div>

              <button key={o.id} onClick={() => openOrder(o.id)} className="w-full text-right mb-2">
                <Card className="p-3.5 active:bg-black/5">
                  <div className="flex justify-between">
                    <div>
                      <div className="text-sm font-bold">{o.orderNo} · {o.customerName}</div>
                      <div className="text-[11px] text-[#6B7280]">{o.itemDescription}</div>
                      <div className="text-[11px] mt-1">
                        {o.carrier ? <span className="text-[#1E5FFF] font-bold">{o.carrier}</span> : <span className="text-[#D97706]">⚠️ لم تُحدد شركة الشحن</span>}

/* ============ Payments screen ============ */
function PaymentsScreen({ orders, fmt, openOrder }) {
  const all = orders.flatMap(o => (o.payments || []).map(p => ({ ...p, orderNo: o.orderNo, orderId: o.id, customer: o.customerName }))).sort((a, b) => b.date.localeCompare(a.date));
  const totalCash = all.filter(p => p.method === 'cash').reduce((s, p) => s + p.amount, 0);
  const totalBank = all.filter(p => p.method === 'transfer').reduce((s, p) => s + p.amount, 0);
  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-3">
        <Card className="p-4"><div className="text-[11px] text-[#6B7280]">إجمالي كاش</div><div className="text-lg font-black">{fmt(totalCash)} د.ل</div></Card>
        <Card className="p-4"><div className="text-[11px] text-[#6B7280]">إجمالي حوالات</div><div className="text-lg font-black">{fmt(totalBank)} د.ل</div></Card>
      </div>
      <Card>
        <div className="px-4 py-3 border-b border-black/5 text-sm font-bold">كل الدفعات ({all.length})</div>
        {all.length === 0 ? <Empty t="لا دفعات مسجلة - سجّل الدفعات من داخل الطلب" /> : (
          <div className="divide-y divide-black/5">
            {all.slice(0, 50).map(p => (
              <button key={p.id} onClick={() => openOrder(p.orderId)} className="w-full text-right px-4 py-3 active:bg-black/5">
                <div className="flex justify-between">
                  <div>
                    <div className="text-sm font-bold text-green-700">+{fmt(p.amount)} د.ل</div>
                    <div className="text-[11px] text-[#6B7280]">{p.orderNo} · {p.customer} · {PAY[p.method]}</div>
                  </div>
                  <div className="text-[11px] text-[#9CA3AF]">{p.date}<br />{p.by}</div>
                </div>
              </button>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

/* ============ Wallets ============ */
function Wallets({ db, fmt, rate, patch, auditMk }) {
  const [f, setF] = useState({ currency: 'lyd', kind: 'in', amount: '', note: '' });
  const w = db.wallet;
  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 gap-3">
        <div className="bg-[#0B1B3A] text-white rounded-2xl p-4">
          <div className="text-[10px] text-white/50 mb-1">محفظة الدولار</div>
          <div className="text-2xl font-black">{fmt(w.usd)} <span className="text-sm text-white/60">$</span></div>
          {rate > 0 && <div className="text-[10px] text-white/40 mt-1">≈ {fmt(w.usd * rate)} د.ل</div>}
        </div>
        <div className="bg-[#1E5FFF] text-white rounded-2xl p-4">
          <div className="text-[10px] text-white/60 mb-1">محفظة الدينار</div>
          <div className="text-2xl font-black">{fmt(w.lyd)} <span className="text-sm text-white/70">د.ل</span></div>
        </div>
      </div>
      {rate > 0 && <Card className="p-4 flex justify-between items-center"><span className="text-xs text-[#6B7280]">الإجمالي التقديري</span><b className="text-lg font-black">{fmt(w.lyd + w.usd * rate)} د.ل</b></Card>}
      <Card className="p-4">
        <div className="text-sm font-bold mb-3">حركة جديدة</div>
        <div className="space-y-2.5">
          <div className="grid grid-cols-2 gap-2">
            <select value={f.currency} onChange={e => setF({ ...f, currency: e.target.value })} className={inp}><option value="lyd">دينار ليبي</option><option value="usd">دولار $</option></select>
            <select value={f.kind} onChange={e => setF({ ...f, kind: e.target.value })} className={inp}><option value="in">إيداع +</option><option value="out">سحب −</option></select>
          </div>
          <input type="text" inputMode="decimal" placeholder="المبلغ" value={f.amount} onChange={e => setF({ ...f, amount: e.target.value })} className={inp} />
          <input placeholder="ملاحظة" value={f.note} onChange={e => setF({ ...f, note: e.target.value })} className={inp} />
          <button onClick={() => {
            const amt = num(f.amount); if (amt <= 0) return;
            const signed = f.kind === 'in' ? amt : -amt;
            patch(n => {
              n.wallet.usd += f.currency === 'usd' ? signed : 0;
              n.wallet.lyd += f.currency === 'lyd' ? signed : 0;
              n.wallet.tx = [{ id: uid(), ...f, amount: amt, date: today() }, ...n.wallet.tx].slice(0, 300);
              n.audit = [auditMk(`حركة محفظة: ${f.kind === 'in' ? '+' : '−'}${amt} ${f.currency === 'usd' ? '$' : 'د.ل'}`), ...n.audit].slice(0, 500);
            });
            setF({ ...f, amount: '', note: '' });
          }} className="w-full bg-[#1E5FFF] text-white text-sm font-bold py-3 rounded-xl">تسجيل</button>
        </div>
      </Card>
      <Card>
        <div className="px-4 py-3 border-b border-black/5 text-sm font-bold">سجل الحركات</div>
        {w.tx.length === 0 ? <Empty t="لا حركات بعد" /> : (
          <div className="divide-y divide-black/5">
            {w.tx.slice(0, 30).map(t => (
              <div key={t.id} className="flex items-center gap-3 px-4 py-3">
                {t.kind === 'in' ? <ArrowUpCircle size={18} className="text-green-600 shrink-0" /> : <ArrowDownCircle size={18} className="text-red-600 shrink-0" />}
                <div className="min-w-0">
                  <div className="text-sm font-bold">{t.kind === 'in' ? '+' : '−'}{fmt(t.amount)} {t.currency === 'usd' ? '$' : 'د.ل'}</div>
                  <div className="text-[11px] text-[#9CA3AF] truncate">{t.date}{t.note ? ` · ${t.note}` : ''}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

/* ============ Settings ============ */
function SettingsScreen({ db, patch, fmt }) {
  const [r, setR] = useState(String(db.settings.rate || ''));
  const [phone, setPhone] = useState(db.settings.companyPhone || '');
  const [savedMsg, setSavedMsg] = useState('');
  const saveRate = () => {
    const v = num(r);
    if (v <= 0) { setSavedMsg('err'); return; }
    patch(n => { n.settings.rate = v; });
    setSavedMsg('ok');
    setTimeout(() => setSavedMsg(''), 2500);
  };
  return (
    <div className="space-y-3">
      <Card className="p-4">
        <div className="text-sm font-bold mb-1">سعر الصرف (د.ل / $)</div>
        <p className="text-[11px] text-[#9CA3AF] mb-2">السعر للعميل يظل ثابت، والأرباح تُحسب بهذا الرقم. كل طلب يحفظ سعر الصرف وقت حجزه تلقائياً.</p>
        <input type="text" inputMode="decimal" value={r} onChange={e => setR(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') saveRate(); }}
          placeholder="مثال: 7.25"
          className="w-full border border-black/10 rounded-xl px-3 py-3 text-lg font-black focus:outline-none focus:ring-2 focus:ring-[#4F8AFF] mb-2" />
        <button onClick={saveRate}
          className="w-full bg-[#1E5FFF] text-white text-sm font-bold py-3.5 rounded-xl active:bg-[#164BD1]">💾 حفظ سعر الصرف</button>
        {savedMsg === 'ok' && <div className="text-xs font-bold text-green-700 bg-[#E9F9EE] rounded-xl px-3 py-2 mt-2 text-center">✅ تم الحفظ — سعر الصرف الآن {fmt(num(r))} د.ل/$</div>}
        {savedMsg === 'err' && <div className="text-xs font-bold text-red-700 bg-[#FDECEC] rounded-xl px-3 py-2 mt-2 text-center">أدخل رقماً صحيحاً أكبر من صفر</div>}
      </Card>
      <Card className="p-4">
        <div className="text-sm font-bold mb-2">رقم واتساب الشركة</div>
        <div className="flex gap-2">
          <input inputMode="tel" placeholder="2189xxxxxxxx" value={phone} onChange={e => setPhone(e.target.value)} className={inp} />
          <button onClick={() => { patch(n => { n.settings.companyPhone = phone; }); setSavedMsg('phone'); setTimeout(() => setSavedMsg(''), 2500); }} className="bg-[#1E5FFF] text-white text-sm font-bold px-5 rounded-xl shrink-0">حفظ</button>
        </div>
        {savedMsg === 'phone' && <div className="text-xs font-bold text-green-700 bg-[#E9F9EE] rounded-xl px-3 py-2 mt-2 text-center">✅ تم حفظ الرقم</div>}
      </Card>
      <Card className="p-4">
        <div className="text-sm font-bold mb-1">نسخة احتياطية</div>
        <p className="text-[11px] text-[#9CA3AF] mb-2">بياناتك محفوظة على هذا الجهاز. نزّل نسخة احتياطية بشكل دوري واحفظها في مكان آمن:</p>
        <button onClick={() => {
          const url = URL.createObjectURL(new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' }));
          const a = document.createElement('a'); a.href = url; a.download = `dalipay-backup-${today()}.json`; a.click(); URL.revokeObjectURL(url);
        }} className="w-full border border-black/10 text-sm font-bold py-3 rounded-xl flex items-center justify-center gap-2"><Download size={15} /> تنزيل نسخة احتياطية</button>
        <label className="w-full border border-black/10 text-sm font-bold py-3 rounded-xl flex items-center justify-center gap-2 mt-2 cursor-pointer">
          📥 استعادة نسخة احتياطية
          <input type="file" accept=".json" className="hidden" onChange={e => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
              try {
                const data = JSON.parse(ev.target.result);
                if (!data.orders || !data.settings) { alert('ملف غير صالح'); return; }
                if (confirm('استعادة النسخة ستستبدل كل البيانات الحالية. متابعة؟')) {
                  localStorage.setItem('dalipay-erp-v1', JSON.stringify(data));
                  location.reload();
                }
              } catch (err) { alert('تعذّرت قراءة الملف'); }
            };
            reader.readAsText(file);
          }} />
        </label>
      </Card>
    </div>
  );
}

/* ============ Analytics ============ */
function Analytics({ a, fmt, rate }) {
  const Top = ({ title, data, unit }) => (
    <Card className="p-4">
      <div className="text-sm font-bold mb-3">{title}</div>
      {data.length === 0 ? <div className="text-[11px] text-[#9CA3AF]">لا بيانات بعد</div> : (
        <div className="space-y-2">
          {data.map(([name, val], i) => (
            <div key={i} className="flex justify-between text-xs">
              <span className="truncate">{i + 1}. {name}</span>
              <b className="shrink-0 mr-2">{typeof val === 'number' && unit === 'د.ل' ? fmt(val) : val} {unit}</b>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
  const pct = a.total ? Math.round((a.done / a.total) * 100) : 0;
  const pctC = a.total ? Math.round((a.cancelled / a.total) * 100) : 0;
  return (
    <div className="space-y-3">
      {!rate && <div className="text-xs font-bold bg-[#FEF3E2] text-[#D97706] rounded-xl px-4 py-3">⚠️ حدّد سعر الصرف حتى تظهر أرباح دقيقة</div>}
      <div className="grid grid-cols-3 gap-2">
        <Card className="p-3 text-center"><div className="text-base font-black">{fmt(a.profitDay)}</div><div className="text-[10px] text-[#6B7280]">ربح اليوم د.ل</div></Card>
        <Card className="p-3 text-center"><div className="text-base font-black">{fmt(a.profitWeek)}</div><div className="text-[10px] text-[#6B7280]">ربح الأسبوع</div></Card>
        <Card className="p-3 text-center"><div className="text-base font-black">{fmt(a.profitMonth)}</div><div className="text-[10px] text-[#6B7280]">ربح الشهر</div></Card>
      </div>
      <div className="grid grid-cols-3 gap-2">
        <Card className="p-3 text-center"><div className="text-base font-black">{a.avgDays.toFixed(1)}</div><div className="text-[10px] text-[#6B7280]">متوسط أيام التنفيذ</div></Card>
        <Card className="p-3 text-center"><div className="text-base font-black text-green-600">{pct}%</div><div className="text-[10px] text-[#6B7280]">طلبات مكتملة</div></Card>
        <Card className="p-3 text-center"><div className="text-base font-black text-red-600">{pctC}%</div><div className="text-[10px] text-[#6B7280]">طلبات ملغاة</div></Card>
      </div>
      <Top title="🏆 أفضل العملاء (بقيمة الطلبات)" data={a.topCustomers} unit="د.ل" />
      <Top title="🛍️ أكثر الموردين استخداماً" data={a.topSuppliers} unit="طلب" />
      <Top title="📦 أكثر المنتجات طلباً" data={a.topProducts} unit="مرة" />
      <Top title="👨‍💼 أداء الموظفين (عدد الطلبات)" data={a.empPerf} unit="طلب" />
    </div>
  );
}

/* ============ Print templates ============ */
function Waybill({ o, fmt, paid, remaining }) {
  return (
    <div className="max-w-md mx-auto border-2 border-[#0B1B3A] rounded-2xl overflow-hidden">
      <div className="bg-[#0B1B3A] text-white px-5 py-4 flex items-center justify-between">
        <div>
          <div className="text-xl font-black">Dali<span className="text-[#4F8AFF]">Pay</span></div>
          <div className="text-[10px] text-white/60 mt-0.5">لخدمات الدفع الإلكتروني والشراء والشحن</div>
        </div>
        <div className="text-left"><div className="text-[10px] text-white/60">بوليصة شحن</div><div className="text-base font-black">{o.orderNo}</div></div>
      </div>
      <div className="p-5 space-y-4 text-sm">
        <div className="grid grid-cols-2 gap-3">
          <WB label="اسم العميل" value={o.customerName} />
          <WB label="الهاتف" value={o.phone || '—'} />
          <WB label="المدينة" value={o.city || '—'} />
          <WB label="العنوان" value={o.address || '—'} />
          <WB label="شركة الشحن" value={o.carrier || '—'} />
          <WB label="رقم التتبع" value={o.trackingNo || '—'} />
          <WB label="تاريخ الحجز" value={o.bookingDate} />
          <WB label="التسليم المتوقع" value={o.expectedDate || '—'} />
        </div>
        <div className="border border-black/10 rounded-xl p-3">
          <div className="text-[10px] text-[#6B7280] mb-1">تفاصيل الشحنة</div>
          <div className="font-bold text-sm">{o.itemDescription || SERVICE[o.serviceType]?.label}</div>
        </div>
        <table className="w-full text-sm"><tbody>
          <tr className="border-b border-black/10"><td className="py-2 text-[#6B7280]">السعر الإجمالي</td><td className="py-2 font-black text-left">{fmt(o.priceLYD)} د.ل</td></tr>
          <tr className="border-b border-black/10"><td className="py-2 text-[#6B7280]">المدفوع</td><td className="py-2 font-black text-left">{fmt(paid)} د.ل</td></tr>
          <tr><td className="py-2 font-bold">المتبقي عند الاستلام</td><td className="py-2 font-black text-left text-base">{fmt(remaining)} د.ل</td></tr>
        </tbody></table>
        <div className="flex justify-between items-end pt-5 text-[11px] text-[#6B7280]">
          <div>توقيع المستلم: ________________</div><div>ختم DaliPay</div>
        </div>
      </div>
    </div>
  );
}
const WB = ({ label, value }) => (<div><div className="text-[10px] text-[#6B7280]">{label}</div><div className="font-bold text-sm">{value}</div></div>);

function Invoice({ o, fmt, paid, remaining }) {
  return (
    <div className="max-w-md mx-auto">
      <div className="flex items-center justify-between border-b-2 border-[#0B1B3A] pb-3 mb-4">
        <div><div className="text-xl font-black">Dali<span className="text-[#1E5FFF]">Pay</span></div><div className="text-[10px] text-[#6B7280]">لخدمات الدفع الإلكتروني والشراء والشحن</div></div>
        <div className="text-left"><div className="text-[10px] text-[#6B7280]">فاتورة</div><div className="text-base font-black">{o.orderNo}</div><div className="text-[10px] text-[#6B7280]">{o.bookingDate}</div></div>
      </div>
      <div className="grid grid-cols-2 gap-3 mb-4 text-sm">
        <WB label="العميل" value={o.customerName} />
        <WB label="الهاتف" value={o.phone || '—'} />
      </div>
      <table className="w-full text-sm border-collapse mb-4">
        <thead><tr className="bg-[#0B1B3A] text-white"><th className="p-2 text-right">البيان</th><th className="p-2">المبلغ</th></tr></thead>
        <tbody>
          <tr className="border-b border-black/10"><td className="p-2">{o.itemDescription || SERVICE[o.serviceType]?.label}</td><td className="p-2 text-center font-bold">{fmt(o.priceLYD)} د.ل</td></tr>
          <tr className="border-b border-black/10"><td className="p-2 text-[#6B7280]">المدفوع</td><td className="p-2 text-center font-bold">{fmt(paid)} د.ل</td></tr>
          <tr><td className="p-2 font-black">المتبقي</td><td className="p-2 text-center font-black text-base">{fmt(remaining)} د.ل</td></tr>
        </tbody>
      </table>
      <div className="text-[11px] text-[#6B7280] text-center pt-3 border-t border-black/10">شكراً لتعاملكم مع DaliPay 💙</div>
    </div>
  );
}

function Report({ orders, fmt, stats, rate, profitOf, paidOf, remainingOf }) {
  return (
    <div>
      <div className="border-b-2 border-[#0B1B3A] pb-3 mb-4">
        <div className="text-xl font-black">Dali<span className="text-[#1E5FFF]">Pay</span> — تقرير شامل</div>
        <div className="text-[11px] text-[#6B7280] mt-1">تاريخ الطباعة: {today()}{rate > 0 ? ` · سعر الصرف: ${fmt(rate)} د.ل/$` : ''}</div>
      </div>
      <div className="grid grid-cols-2 gap-2 mb-4 text-center text-sm">
        <div className="border border-black/10 rounded-xl py-2.5"><div className="font-black">{stats.total}</div><div className="text-[10px] text-[#6B7280]">إجمالي الطلبات</div></div>
        <div className="border border-black/10 rounded-xl py-2.5"><div className="font-black">{fmt(stats.revenue)}</div><div className="text-[10px] text-[#6B7280]">إيراد محصّل د.ل</div></div>
        <div className="border border-black/10 rounded-xl py-2.5"><div className="font-black">{fmt(stats.outstanding)}</div><div className="text-[10px] text-[#6B7280]">متبقي د.ل</div></div>
        <div className="border border-black/10 rounded-xl py-2.5"><div className="font-black">{fmt(stats.profitNow)}</div><div className="text-[10px] text-[#6B7280]">ربح متوقع د.ل</div></div>
      </div>
      <div className="space-y-2">
        {orders.map(o => (
          <div key={o.id} className="border border-black/10 rounded-xl p-3 text-xs">
            <div className="flex justify-between font-bold text-sm mb-1"><span>{o.orderNo} · {o.customerName}</span><span>{STATUS[o.status].label}</span></div>
            <div className="text-[#6B7280] mb-1">{o.itemDescription || SERVICE[o.serviceType]?.label} · حجز {o.bookingDate}{o.carrier ? ` · ${o.carrier}` : ''}{o.trackingNo ? ` · ${o.trackingNo}` : ''}</div>
            <div className="flex flex-wrap gap-x-4 gap-y-1">
              <span>السعر: <b>{fmt(o.priceLYD)} د.ل</b></span>
              <span>المدفوع: <b>{fmt(paidOf(o))}</b></span>
              <span>المتبقي: <b>{fmt(remainingOf(o))}</b></span>
              {rate > 0 && <span>الربح: <b>{fmt(profitOf(o))} د.ل</b></span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DaliPayERP />);
</script>
</body>
</html>
